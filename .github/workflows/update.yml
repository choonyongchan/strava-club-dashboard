name: Update and Deploy Strava Dashboard

on:
  schedule:
    # Every hour
    - cron: '0 * * * *'
  workflow_dispatch:   # Manual trigger via GitHub UI
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard/index.html
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_CLUB_ID:       ${{ secrets.STRAVA_CLUB_ID }}
          CLUB_NAME:            ${{ secrets.CLUB_NAME }}
          WEATHER_LAT:          ${{ secrets.WEATHER_LAT }}
          WEATHER_LON:          ${{ secrets.WEATHER_LON }}
          TIMEZONE:             ${{ secrets.TIMEZONE }}
        run: python3 generate.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/
          git diff --cached --quiet || git commit -m "🏃 Dashboard update $(date +'%d.%m.%Y %H:%M')"
          git pull --rebase
          for i in 1 2 3; do
            git push && break || { echo "Push failed (attempt $i/3), waiting 15s..."; sleep 15; git pull --rebase; }
          done

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
